kind = "web"
previewPath = "/"
title = "AI Creator Tools"
version = "1.0.0"
id = "artifacts/creator-tools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22453
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/creator-tools run dev"

[services.env]
PORT = "22453"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/creator-tools", "run", "build"]
publicDir = "artifacts/creator-tools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
